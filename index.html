<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #dfe6e9;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: #636e72;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .intro {
            color: #636e72;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .info {
            list-style: none;
            margin-bottom: 30px;
        }

        .info li {
            margin: 10px 0;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-primary {
            background: #6c5ce7;
            color: white;
        }

        .btn-secondary {
            background: #74b9ff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头像区域，你可以改成自己的头像文字 -->
        <div class="avatar">👨‍💻</div>
        
        <!-- 名字和介绍 -->
        <h1>Jayhou</h1>
        <p class="intro">
            你好！我是一名热爱技术的工程师<br>
            喜欢折腾代码、探索新事物<br>
            这里是我的第一个个人网页
        </p>

        <!-- 信息列表 -->
        <ul class="info">
            <li>📍 坐标：上海</li>
            <li>💼 职业：热仿真工程师</li>
            <li>🎯 爱好：代码、硬件、户外</li>
        </ul>

        <!-- 按钮 -->
        <div class="btn-group">
            <a href="#" class="btn btn-primary">我的项目</a>
            <a href="#" class="btn btn-secondary">联系我</a>
        </div>
    </div>
</body>
</html>
